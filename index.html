<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>SELA RadOnc Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { overscroll-behavior: none; }
    body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: #f9fafb; }
    .mono { font-family: 'DM Mono', monospace !important; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    /* safe area padding */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    /* smooth transitions */
    #app-main { transition: opacity 0.1s ease; }
    /* Tailwind overrides for toggle */
    .after\:content-\[\''\'\]:after { content: ''; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

  <div class="max-w-md mx-auto relative min-h-screen">

    <!-- ── Header ──────────────────────────────────────── -->
    <header class="fixed top-0 left-0 right-0 z-50 max-w-md mx-auto">
      <div class="bg-orange-500 text-white px-4 py-3 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-orange-600 rounded-xl flex items-center justify-center text-xl shadow-sm">🦎</div>
          <div>
            <div class="font-bold text-base leading-tight">SELA RadOnc</div>
            <div class="text-xs text-orange-200 leading-tight">放射腫瘤科臨床工具</div>
          </div>
        </div>
        <div class="font-medium text-xs bg-orange-700 px-2.5 py-1 rounded-full mono tracking-wide">V1.2.1</div>
      </div>
    </header>

    <!-- ── Main ────────────────────────────────────────── -->
    <main id="app-main" class="pt-16 pb-24 min-h-screen"></main>

    <!-- ── Bottom Nav ──────────────────────────────────── -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 z-50 safe-bottom">
      <div class="flex items-stretch">

        <button data-page="tools" onclick="App.navigate('tools')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 text-orange-500 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <span class="text-xs font-medium">工具</span>
        </button>

        <button data-page="staging" onclick="App.navigate('staging')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 text-gray-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          <span class="text-xs font-medium">分期</span>
        </button>

        <button data-page="constraints" onclick="App.navigate('constraints')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 text-gray-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          <span class="text-xs font-medium">限制</span>
        </button>

        <button data-page="icd" onclick="App.navigate('icd')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 text-gray-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span class="text-xs font-medium">ICD</span>
        </button>

        <button data-page="settings" onclick="App.navigate('settings')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 text-gray-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="text-xs font-medium">設定</span>
        </button>

      </div>
    </nav>

  </div><!-- /max-w-md -->

  <!-- ── Data ────────────────────────────────────────────── -->
  <script src="data/icd10.js"></script>
  <script src="data/constraints.js"></script>
  <!-- ── Modules ─────────────────────────────────────────── -->
  <script src="js/tools-calc.js"></script>
  <script src="js/tools-score.js"></script>
  <script src="js/ui-icd.js"></script>
  <script src="js/ui-constraints.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
