<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>SELA RadOnc Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { overscroll-behavior: none; }
    body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: #E4E8F0; color: #1E2530; }
    .mono { font-family: 'DM Mono', monospace !important; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    #app-main { transition: opacity 0.1s ease; }

    /* ── Nordic cold palette ─────────────────────────────── */
    :root {
      --bg:      #E4E8F0;   /* cool blue-gray page bg */
      --surface: #F0F2F6;   /* card surface */
      --card2:   #EAECF2;   /* secondary surface */
      --border:  #C8CDD8;
      --ink1:    #1E2530;   /* primary text */
      --ink2:    #4A5568;   /* secondary */
      --ink3:    #9AA0AA;   /* muted */
      --active:  #2C3A50;   /* dark slate — CTAs, selected */
    }

    /* Header — white surface on cold bg */
    .sela-header { background: #F0F2F6; border-bottom: 1px solid #C8CDD8; }

    /* Tab active */
    .tab-active  { background: #FFFFFF; color: var(--active); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .tab-inactive { color: var(--ink3); }

    /* section label */
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); }
  </style>
</head>
<body style="background:#E4E8F0; color:#1E2530;">

  <div class="max-w-md mx-auto relative min-h-screen">

    <!-- ── Header ──────────────────────────────────────── -->
    <header class="fixed top-0 left-0 right-0 z-50 max-w-md mx-auto">
      <div class="sela-header px-4 py-2.5 flex items-center justify-between" style="box-shadow:0 1px 8px rgba(0,0,0,.18);">
        <div class="flex items-center gap-3">
          <img src="assets/logo.jpg" alt="SELA" class="w-10 h-10 rounded-xl object-cover">
          <div>
            <div class="font-semibold text-base leading-tight tracking-wide" style="color:#1A1A1A;">RadOnc Tools</div>
            <div class="text-xs leading-tight" style="color:#9E9A93;">放射腫瘤科臨床工具</div>
          </div>
        </div>
        <div class="mono text-xs px-2.5 py-1 rounded-full font-medium" style="background:#F2F0EC;color:#5A5750;">V1.3</div>
      </div>
    </header>

    <!-- ── Main ────────────────────────────────────────── -->
    <main id="app-main" class="pt-16 pb-24 min-h-screen" style="background:#E4E8F0;"></main>

    <!-- ── Bottom Nav ──────────────────────────────────── -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto safe-bottom z-50"
         style="background:#F0F2F6;border-top:1px solid #C8CDD8;">
      <div class="flex items-stretch">

        <!-- 工具 -->
        <button data-page="tools" onclick="App.navigate('tools')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:#1A1A1A;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span class="text-xs font-medium">工具</span>
        </button>

        <!-- 分期 -->
        <button data-page="staging" onclick="App.navigate('staging')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:#9E9A93;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 18h16M4 12h10M4 6h6"/>
          </svg>
          <span class="text-xs font-medium">分期</span>
        </button>

        <!-- 限制 -->
        <button data-page="constraints" onclick="App.navigate('constraints')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:#9E9A93;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <path stroke-linecap="round" d="M12 7v5l3 3"/>
          </svg>
          <span class="text-xs font-medium">限制</span>
        </button>

        <!-- ICD -->
        <button data-page="icd" onclick="App.navigate('icd')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:#9E9A93;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 4h12a1 1 0 011 1v14a1 1 0 01-1 1H6a1 1 0 01-1-1V5a1 1 0 011-1z"/>
            <path stroke-linecap="round" d="M9 9h6M9 13h4"/>
          </svg>
          <span class="text-xs font-medium">ICD</span>
        </button>

        <!-- 設定 -->
        <button data-page="settings" onclick="App.navigate('settings')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:#9E9A93;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="2.5"/>
            <path stroke-linecap="round" d="M12 5v2M12 17v2M5 12H3M21 12h-2M7.05 7.05 5.64 5.64M18.36 18.36l-1.41-1.41M7.05 16.95l-1.41 1.41M18.36 5.64l-1.41 1.41"/>
          </svg>
          <span class="text-xs font-medium">設定</span>
        </button>

      </div>
    </nav>

  </div><!-- /max-w-md -->

  <!-- ── Data ────────────────────────────────────────────── -->
  <script src="data/icd10.js"></script>
  <script src="data/constraints.js"></script>
  <!-- ── Modules ─────────────────────────────────────────── -->
  <script src="js/tools-calc.js"></script>
  <script src="js/tools-score.js"></script>
  <script src="js/staging.js"></script>
  <script src="js/ui-icd.js"></script>
  <script src="js/ui-constraints.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
