<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SELA RadOnc Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { overscroll-behavior: none; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Nordic Palette ──────────────────────────────────── */
    :root {
      --bg:      #ECEEF3;   /* fog page                    */
      --card:    #F7F7F9;   /* card surface                */
      --card2:   #EDEEF4;   /* result / alt surface        */
      --border:  #D8DAE2;   /* cool-neutral border         */

      --t1:      #1F2029;   /* near-black                  */
      --t2:      #585A6B;   /* medium gray                 */
      --t3:      #9A9BAA;   /* muted placeholder           */

      --accent:  #3D6494;   /* dusty blue                  */
      --acc-bg:  #DDE6F0;   /* accent tint surface         */

      --hdr:     #252831;   /* header dark                 */

      --result:  #EDEEF4;
      --danger:  #8B3A33;
      --warn-bg: #F4EFE8;
      --warn:    #7A4B20;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--t1);
      line-height: 1.5;
    }
    .mono { font-family: 'DM Mono', monospace !important; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    #app-main { transition: opacity 0.12s ease; }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(31,32,41,.05);
    }

    /* ── Stepper ─────────────────────────────────────────── */
    .step-btn {
      width: 36px; height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--t1);
      font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.1s;
    }
    .step-btn:active { background: var(--acc-bg); }

    /* ── Pill selector (α/β, etc.) ───────────────────────── */
    .pill-opt {
      flex: 1; padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--t2);
      font-size: 12px; text-align: center;
      cursor: pointer; transition: all 0.12s; line-height: 1.3;
    }
    .pill-opt.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Filter pill (top bar selectors) ─────────────────── */
    .fpill {
      font-size: 0.72rem;
      padding: 4px 11px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--t2);
      white-space: nowrap; cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .fpill.on {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Section label ───────────────────────────────────── */
    .sec-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .10em; text-transform: uppercase;
      color: var(--t3);
    }

    /* ── Tool card chevron ───────────────────────────────── */
    .tool-body { display: none; }
    .tool-body.open { display: block; }

    /* ── Nav active ──────────────────────────────────────── */
    .nav-active { color: var(--accent) !important; }

    /* ── Input ───────────────────────────────────────────── */
    .inp {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 14px;
      color: var(--t1);
      background: var(--card);
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .inp:focus { border-color: var(--accent); background: #fff; }
    select.inp {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 32px;
    }

    /* ── Calc button ─────────────────────────────────────── */
    .calc-btn {
      width: 100%; margin-top: 12px;
      padding: 10px; border-radius: 10px;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 500;
      border: none; cursor: pointer;
      transition: opacity 0.12s;
      letter-spacing: .02em;
    }
    .calc-btn:active { opacity: 0.82; }

    /* ── Result panel ────────────────────────────────────── */
    .result-panel {
      margin-top: 14px; padding: 14px;
      border-radius: 12px;
      background: var(--card2);
      border: 1px solid var(--border);
    }
    .result-val {
      font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 500;
      color: var(--t1);
    }


    /* ── Source badges ───────────────────────────────────── */
    .badge-rtog    { background:#D8E6F2; color:#2B5278; border-radius:5px; padding:2px 7px; font-size:11px; }
    .badge-quantec { background:#D8EDE2; color:#245B3A; border-radius:5px; padding:2px 7px; font-size:11px; }
    .badge-tg101   { background:#E4DCF2; color:#4A2E7A; border-radius:5px; padding:2px 7px; font-size:11px; }
    .badge-nccn    { background:#F2EBD6; color:#7A5010; border-radius:5px; padding:2px 7px; font-size:11px; }
    .badge-custom  { background:#E4E2EC; color:#3E3A55; border-radius:5px; padding:2px 7px; font-size:11px; }

    /* ── Card header divider when open ──────────────────── */
    .card-hdr-open { border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>

  <div class="max-w-md mx-auto relative min-h-screen">

    <!-- ── Header ──────────────────────────────────────── -->
    <header class="fixed top-0 z-50" style="left:50%;transform:translateX(-50%);width:100%;max-width:28rem;">
      <div class="px-4 py-2.5 flex items-center justify-between"
           style="background:var(--hdr);box-shadow:0 1px 8px rgba(0,0,0,.22);">
        <div class="flex items-center gap-3">
          <img src="assets/logo.jpg" alt="SELA" class="w-10 h-10 rounded-xl object-cover"
               style="border:1.5px solid rgba(255,255,255,.15);">
          <div>
            <div class="font-semibold text-base leading-tight text-white tracking-wide">RadOnc Tools</div>
            <div class="text-xs leading-tight" style="color:rgba(255,255,255,.45);">放射腫瘤科臨床工具</div>
          </div>
        </div>
        <div class="mono text-xs px-2.5 py-1 rounded-full font-medium"
             style="background:rgba(255,255,255,.10);color:rgba(255,255,255,.6);">V2.6</div>
      </div>
    </header>

    <!-- ── Main ────────────────────────────────────────── -->
    <main id="app-main" class="pt-16 pb-24 min-h-screen"></main>

    <!-- ── Bottom Nav ──────────────────────────────────── -->
    <nav class="fixed bottom-0 z-50 safe-bottom" style="left:50%;transform:translateX(-50%);width:100%;max-width:28rem;background:#fff;border-top:1px solid var(--border);">
      <div class="flex items-stretch">

        <button data-page="tools" onclick="App.navigate('tools')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors nav-active">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span class="text-xs font-medium">工具</span>
        </button>

        <button data-page="staging" onclick="App.navigate('staging')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:var(--t3);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 18h16M4 12h10M4 6h6"/>
          </svg>
          <span class="text-xs font-medium">分期</span>
        </button>

        <button data-page="constraints" onclick="App.navigate('constraints')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:var(--t3);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 7v5l3 3"/>
          </svg>
          <span class="text-xs font-medium">劑量</span>
        </button>

        <button data-page="icd" onclick="App.navigate('icd')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:var(--t3);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 4h12a1 1 0 011 1v14a1 1 0 01-1 1H6a1 1 0 01-1-1V5a1 1 0 011-1z"/>
            <path stroke-linecap="round" d="M9 9h6M9 13h4"/>
          </svg>
          <span class="text-xs font-medium">ICD</span>
        </button>

        <button data-page="settings" onclick="App.navigate('settings')"
          class="nav-btn flex-1 flex flex-col items-center justify-center py-2.5 gap-1 transition-colors" style="color:var(--t3);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="2.5"/>
            <path stroke-linecap="round" d="M12 5v2M12 17v2M5 12H3M21 12h-2M7.05 7.05 5.64 5.64M18.36 18.36l-1.41-1.41M7.05 16.95l-1.41 1.41M18.36 5.64l-1.41 1.41"/>
          </svg>
          <span class="text-xs font-medium">設定</span>
        </button>

      </div>
    </nav>

  </div>

  <!-- Data -->
  <script src="js/utils.js"></script>
  <script src="data/icd10.js"></script>
  <script src="data/constraints.js"></script>
  <script src="data/dose-recs.js"></script>
  <!-- Modules -->
  <script src="js/tools-rt.js"></script>
  <script src="js/tools-calc.js"></script>
  <script src="js/tools-score.js"></script>
  <script src="js/staging.js"></script>
  <script src="js/ui-icd.js"></script>
  <script src="js/ui-constraints.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
